<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Huis Aanmaken of Bewerken</title>
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="site-header">
        <div class="brand">
          <div class="brand-mark"></div>
          <h1>Interieurstijl Dossier</h1>
        </div>
        <nav class="nav-links">
          <a href="houses-list.html">Terug naar Huizen</a>
        </nav>
      </header>

      <section class="page-title">
        <div>
          <h2>Huisformulier</h2>
          <p>Maak een nieuw huis aan of bewerk een bestaand huis.</p>
        </div>
      </section>

      <section class="card">
        <form action="#" method="post">
          <div class="field">
            <label for="name">Huisnaam</label>
            <input id="name" name="name" type="text" placeholder="Hoofdwoning" />
          </div>

          <div class="grid cols-2">
            <div class="field">
              <label for="street">Straat</label>
              <input id="street" name="street" type="text" placeholder="Voorbeeldstraat 12" />
            </div>

            <div class="field">
              <label for="city">Plaats</label>
              <input id="city" name="city" type="text" placeholder="Utrecht" />
            </div>
          </div>

          <div class="field">
            <label for="notes">Algemene Notities</label>
            <textarea id="notes" name="notes" placeholder="Algemene details over dit huis"></textarea>
          </div>

          <div style="display: flex; gap: 0.6rem; flex-wrap: wrap;">
            <button class="btn primary" type="submit">Huis Opslaan</button>
            <a class="btn ghost" href="houses-list.html">Annuleren</a>
          </div>
        </form>
      </section>
    </div>
  </body>
</html>
