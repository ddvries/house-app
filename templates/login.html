<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Huis Materialen - Inloggen</title>
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body>
    <main class="login-wrap">
      <section class="card login-card">
        <div class="brand" style="margin-bottom: 1rem;">
          <div class="brand-mark"></div>
          <div>
            <h1>Interieurstijl Dossier</h1>
            <p class="muted" style="margin: 0.2rem 0 0;">Log in om je huizen en ruimtes te beheren</p>
          </div>
        </div>

        <form action="#" method="post">
          <div class="field">
            <label for="email">E-mailadres</label>
            <input id="email" name="email" type="email" placeholder="jij@voorbeeld.nl" />
          </div>

          <div class="field">
            <label for="password">Wachtwoord</label>
            <input id="password" name="password" type="password" placeholder="Je wachtwoord" />
          </div>

          <label class="chip" for="remember">
            <input id="remember" name="remember" type="checkbox" />
            Ingelogd blijven
          </label>

          <button class="btn primary" type="submit">Inloggen</button>
        </form>
      </section>
    </main>
  </body>
</html>
